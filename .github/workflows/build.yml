name: Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build Windows
      shell: pwsh
      run: |
        mkdir ${{ github.workspace }}/release

        # Конфигурируем (скачивает зависимости)
        cmake -A Win32 -B ${{ github.workspace }}/build -DCMAKE_BUILD_TYPE=Release -S ${{ github.workspace }} -DOUTDIR=${{ github.workspace }}/release

        # Патчим integer.cpp - убираем stdext::make_checked_array_iterator
        $intFile = "${{ github.workspace }}/build/_deps/cryptopp-cmake-build/cryptopp/integer.cpp"
        if (Test-Path $intFile) {
          (Get-Content $intFile -Raw) `
            -replace '#if \(CRYPTOPP_MSC_VERSION >= 1500\)\r?\n\t\t\tstd::reverse_copy\(encodedInteger, encodedInteger\+byteCount,\r?\n\t\t\t\tstdext::make_checked_array_iterator\(block\.begin\(\), block\.size\(\)\)\);', `
                     '#if (CRYPTOPP_MSC_VERSION >= 1500) && 0`n`t`t`tstd::reverse_copy(encodedInteger, encodedInteger+byteCount,`n`t`t`t`tstdext::make_checked_array_iterator(block.begin(), block.size()));' |
          Set-Content $intFile -NoNewline
        }

        # Патчим zdeflate.cpp - убираем stdext::make_unchecked_array_iterator
        $zdFile = "${{ github.workspace }}/build/_deps/cryptopp-cmake-build/cryptopp/zdeflate.cpp"
        if (Test-Path $zdFile) {
          (Get-Content $zdFile -Raw) `
            -replace '#if CRYPTOPP_MSC_VERSION >= 1600', '#if 0 // patched: stdext removed in VS2026' |
          Set-Content $zdFile -NoNewline
        }

        # Собираем
        cmake --build ${{ github.workspace }}/build --config Release --target csgo srcds csgo_gc

    - name: Package
      shell: bash
      run: |
        cp $GITHUB_WORKSPACE/README.md $GITHUB_WORKSPACE/release/
        mkdir $GITHUB_WORKSPACE/release/licenses
        cp $GITHUB_WORKSPACE/LICENSE $GITHUB_WORKSPACE/release/licenses/LICENSE-csgo_gc.txt
        cp $GITHUB_WORKSPACE/build/_deps/cryptopp-cmake-build/cryptopp/License.txt $GITHUB_WORKSPACE/release/licenses/LICENSE-crypto++.txt
        cp $GITHUB_WORKSPACE/build/_deps/distorm-src/COPYING $GITHUB_WORKSPACE/release/licenses/LICENSE-distorm.txt
        cp $GITHUB_WORKSPACE/build/_deps/funchook-src/LICENSE $GITHUB_WORKSPACE/release/licenses/LICENSE-funchook.txt
        cp $GITHUB_WORKSPACE/build/_deps/protobuf-src/LICENSE $GITHUB_WORKSPACE/release/licenses/LICENSE-protobuf.txt
        cp $GITHUB_WORKSPACE/examples/config.txt $GITHUB_WORKSPACE/release/csgo_gc/
        cp $GITHUB_WORKSPACE/examples/inventory.txt $GITHUB_WORKSPACE/release/csgo_gc/
        cp $GITHUB_WORKSPACE/examples/price_sheet.txt $GITHUB_WORKSPACE/release/csgo_gc/
        cp $GITHUB_WORKSPACE/examples/unusual_loot_lists.txt $GITHUB_WORKSPACE/release/csgo_gc/

    - name: Zip artifacts
      shell: pwsh
      run: |
        $out = Join-Path $env:GITHUB_WORKSPACE "csgo_gc-windows.zip"
        Compress-Archive -Path (Join-Path $env:GITHUB_WORKSPACE 'release\*') -DestinationPath $out -Force

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: csgo_gc-windows
        path: ${{ github.workspace }}/csgo_gc-windows.zip

  publish:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create continuous release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          TAG=continuous
          files=( $(find artifacts -type f -name "*.zip") )
          if [ ${#files[@]} -gt 0 ]; then
            gh release delete "$TAG" --cleanup-tag --repo "$REPO" --yes || true
            sleep 10s
            gh release create "$TAG" --repo "$REPO" \
              --title "Continuous Build" \
              --notes "$SHA" \
              --target "$SHA"
            gh release upload "$TAG" --repo "$REPO" "${files[@]}" --clobber
          fi
